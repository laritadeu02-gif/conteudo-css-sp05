<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="./css/style04.css">
    <title>Aula 10 CSS</title>
</head>
<body>
    <!-- Grid Layout -->

    <h2>Exemplos de itens de grid</h2>

    <h3>grid-colum-start: 1 </h3>
    <h3>grid-colum-start: 3 </h3>
    

<div class="ex1">
    <div id="ex1-item1">1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
</div>


<hr>

<h2>Exemplo de abrangência utilizando uma shorthand </h2>

<h3>grid-colun: 1 / span 2 </h3>

<div class="ex2">
    <div id="ex2-item1">1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
</div>

<hr>

<h2>Exemplo de abrangência em linhas</h2>

<h3>grid-colum-start 1</h3>
<h3>grid-row-end: 3 </h3>


<div class="ex3">
    <div id="ex3-item1">1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
</div>


</body>
</html>
